<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mosaic 9:16 canvas/video diagnostic</title>
<style>
  body { font-family: -apple-system, Helvetica, Arial, sans-serif; margin: 1rem; background:#14151a; color:#e6e6e6; }
  h1 { font-size: 1.1rem; }
  .case { border:1px solid #2c2d33; border-radius:8px; padding:.75rem; margin:.75rem 0; }
  .name { font-weight:600; margin-bottom:.4rem; }
  .ok { color:#4caf50; } .bad { color:#ff5252; }
  canvas { background:#222; border:1px solid #444; max-width:120px; height:auto; }
  pre { white-space:pre-wrap; font-size:.8rem; color:#9aa0a6; margin:.3rem 0 0; }
</style>
</head>
<body>
  <h1>9:16 canvas ← video draw test</h1>
  <div id="ua"></div>
  <div id="out"></div>
<script>
  document.getElementById('ua').innerHTML = '<pre>' + navigator.userAgent + '</pre>';
  const out = document.getElementById('out');

  // tests whether a preview video can be decoded and drawn to a <canvas>,
  // exactly like the mosaic tiles do. Uses the already-deployed demo assets.
  const cases = [
    { name: '1:1 preview  (resized.mov, expected 320x320)', url: '/uploads/330055/resized.mov' },
    { name: '9:16 preview (resized_9x16.mov, expected 320x576)', url: '/uploads/330055/resized_9x16.mov' },
  ];

  async function runCase(c) {
    const box = document.createElement('div');
    box.className = 'case';
    box.innerHTML = '<div class="name">' + c.name + '</div><canvas width="120" height="213"></canvas><pre>loading…</pre>';
    out.appendChild(box);
    const canvas = box.querySelector('canvas');
    const log = box.querySelector('pre');
    const ctx = canvas.getContext('2d');

    let blobUrl;
    try {
      const resp = await fetch(c.url);
      const blob = await resp.blob();
      blobUrl = URL.createObjectURL(blob);
    } catch (e) { log.innerHTML = '<span class="bad">fetch failed: ' + e + '</span>'; return; }

    const v = document.createElement('video');
    v.muted = true; v.autoplay = true; v.loop = true; v.playsInline = true;
    v.setAttribute('playsinline',''); v.setAttribute('webkit-playsinline','');
    v.src = blobUrl;

    const result = () => {
      try {
        canvas.width = v.videoWidth || 120;
        canvas.height = v.videoHeight || 213;
        ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
        const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let n = 0; for (let i = 3; i < d.length; i += 4) if (d[i] > 10 && (d[i-3]||d[i-2]||d[i-1])) n++;
        const drew = n > 0;
        log.innerHTML =
          'videoWidth×Height: ' + v.videoWidth + '×' + v.videoHeight +
          ' (16-aligned H: ' + (v.videoHeight % 16 === 0) + ')\n' +
          'readyState: ' + v.readyState + '  error: ' + (v.error ? v.error.code : 'none') + '\n' +
          'drawn pixels: ' + n + ' / ' + (canvas.width*canvas.height) + '  → ' +
          (drew ? '<span class="ok">DREW ✓</span>' : '<span class="bad">BLANK ✗</span>');
      } catch (e) {
        log.innerHTML = '<span class="bad">draw/read error: ' + e + '</span>\n' +
          'videoWidth×Height: ' + v.videoWidth + '×' + v.videoHeight;
      }
    };

    v.addEventListener('canplay', () => v.play().catch(()=>{}));
    // give it a moment to present a frame, then draw
    v.addEventListener('playing', () => setTimeout(result, 600));
    v.addEventListener('error', () => { log.innerHTML = '<span class="bad">video error code ' + (v.error && v.error.code) + '</span>'; });
    setTimeout(() => { if (log.textContent.indexOf('loading') === 0) result(); }, 3000);
  }

  (async () => { for (const c of cases) await runCase(c); })();
</script>
</body>
</html>
